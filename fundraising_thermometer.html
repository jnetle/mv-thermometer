<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mira Vista Annual Fundraising Thermometer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { display: flex; justify-content: center; background: transparent; font-family: 'Arial Black', Arial, sans-serif; }
  .widget-container { max-width: 480px; width: 100%; }
  .thermometer-wrap { position: relative; width: 100%; line-height: 0; }
  .bg-image { width: 100%; height: auto; display: block; }
  .honeycomb-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  .honeycomb {
    fill: white; stroke: #1a1a1a; stroke-width: 10;
    stroke-linejoin: round; transition: fill 0.35s ease;
  }
  .honeycomb.filled { fill: #ffce00; }
  .honeycomb.flash  { fill: #fff5a0; }

  .info-panel {
    background: #1069cb;
    border-radius: 0 0 16px 16px;
    padding: 22px 28px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    /* size the text below to the panel's own width (not the viewport) */
    container-type: inline-size;
  }
  .raised-label {
    font-size: clamp(8px, 3.1cqw, 14px);
    font-weight: 700;
    color: rgba(255,255,255,0.88);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }
  .raised-amount {
    font-size: clamp(16px, 13cqw, 56px);
    font-weight: 900;
    color: #ffce00;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.25);
    line-height: 1;
    white-space: nowrap;
  }
  /* ── Amount celebrations ── */
  @keyframes amount-shake {
    0%, 100% { transform: translateX(0) rotate(0deg); }
    12%  { transform: translateX(-7px) rotate(-1.5deg); }
    25%  { transform: translateX(7px)  rotate(1.5deg); }
    37%  { transform: translateX(-5px) rotate(-0.8deg); }
    50%  { transform: translateX(5px)  rotate(0.8deg); }
    62%  { transform: translateX(-3px) rotate(-0.4deg); }
    75%  { transform: translateX(3px)  rotate(0.4deg); }
    87%  { transform: translateX(-1px); }
  }
  @keyframes amount-pulse {
    0%, 100% {
      transform: scale(1);
      text-shadow: 2px 2px 0 rgba(0,0,0,0.25);
    }
    50% {
      transform: scale(1.07);
      text-shadow: 2px 2px 0 rgba(0,0,0,0.25),
                   0 0 18px rgba(255,206,0,0.9),
                   0 0 40px rgba(255,206,0,0.45);
    }
  }
  .amount-shake {
    animation: amount-shake 0.55s ease-in-out 1;
    display: inline-block;
  }
  .amount-pulse {
    animation: amount-pulse 2s ease-in-out 1;
    display: inline-block;
  }

  .of-goal {
    font-size: clamp(10px, 4.4cqw, 20px);
    font-weight: 700;
    color: rgba(255,255,255,0.82);
    white-space: nowrap;
  }
  #confetti-canvas {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 10;
  }
</style>
</head>

    <div class="of-goal"       id="ofGoalDisplay"></div>

<script>
// ─────────────────────────────────────────────
// Values come from URL query params if present, else these defaults:
//   ?year=2025-26&goal=150000&current=32500
const _params = new URLSearchParams(location.search);
const _num = (key, dflt) => {
  const v = _params.get(key);
  return (v !== null && v.trim() !== '' && !isNaN(Number(v))) ? Number(v) : dflt;
};
const SCHOOL_YEAR    = _params.get('year') || "2025-26";
const GOAL_AMOUNT    = _num('goal', 150000);
const CURRENT_AMOUNT = _num('current', 32500);
// ─────────────────────────────────────────────
const TOTAL = 40;
const pct   = Math.min(1, Math.max(0, CURRENT_AMOUNT / GOAL_AMOUNT));
const targetFilled = Math.round(pct * TOTAL);
const fmt = n => '$' + Math.round(n).toLocaleString('en-US');

document.getElementById('raisedLabel').textContent   = '🐝 Amount Raised for ' + SCHOOL_YEAR;
document.getElementById('raisedDisplay').textContent = fmt(CURRENT_AMOUNT);
document.getElementById('ofGoalDisplay').textContent = 'of goal ' + fmt(GOAL_AMOUNT);

const hexEls = Array.from({length: TOTAL}, (_, i) => document.getElementById('hc' + i));
let current = 0, confettiFired = false;
function fillNext() {
  if (current >= targetFilled) return;
  const isLast = current === targetFilled - 1;
  const el = hexEls[current];
  el.classList.add('flash');
  setTimeout(() => {
    el.classList.remove('flash');
    el.classList.add('filled');
    if (isLast && !confettiFired) { confettiFired = true; setTimeout(launchConfetti, 250); setTimeout(animateAmount, 900); }
  }, 200);
  current++;
  setTimeout(fillNext, 110);
}
setTimeout(fillNext, 600);
function animateAmount() {
  const el = document.getElementById('raisedDisplay');
  el.classList.add('amount-shake');
  el.addEventListener('animationend', () => {
    el.classList.remove('amount-shake');
    el.classList.add('amount-pulse');
  }, { once: true });
}

function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const wrap = canvas.parentElement;
  canvas.width = wrap.offsetWidth; canvas.height = wrap.offsetHeight;
  const ctx = canvas.getContext('2d');
  const COLORS = ['#ffce00','#ffce00','#1a6fcb','#ffffff','#000000','#fab918','#96d4d0'];
  const SHAPES = ['rect','circle','hex'];
  const particles = Array.from({length:180},()=>({
    x:Math.random()*canvas.width,y:-10-Math.random()*canvas.height*0.4,
    size:6+Math.random()*10,color:COLORS[Math.floor(Math.random()*COLORS.length)],
    shape:SHAPES[Math.floor(Math.random()*SHAPES.length)],
    vx:(Math.random()-0.5)*3,vy:2.5+Math.random()*4,
    rot:Math.random()*Math.PI*2,rotV:(Math.random()-0.5)*0.18,
    opacity:1,decay:0.008+Math.random()*0.006,
  }));
  function dH(c,x,y,r){c.beginPath();for(let i=0;i<6;i++){const a=(Math.PI/3)*i-Math.PI/6;i===0?c.moveTo(x+r*Math.cos(a),y+r*Math.sin(a)):c.lineTo(x+r*Math.cos(a),y+r*Math.sin(a));}c.closePath();}
  (function tick(){
    ctx.clearRect(0,0,canvas.width,canvas.height);let alive=false;
    for(const p of particles){
      if(p.opacity<=0)continue;alive=true;
      p.x+=p.vx;p.y+=p.vy;p.vy+=0.07;p.vx*=0.995;p.rot+=p.rotV;
      if(p.y>canvas.height*0.6)p.opacity-=p.decay;
      ctx.save();ctx.globalAlpha=Math.max(0,p.opacity);
      ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.color;
      if(p.shape==='rect')ctx.fillRect(-p.size/2,-p.size*0.35,p.size,p.size*0.7);
      else if(p.shape==='circle'){ctx.beginPath();ctx.arc(0,0,p.size*0.45,0,Math.PI*2);ctx.fill();}
      else{dH(ctx,0,0,p.size*0.5);ctx.fill();}
      ctx.restore();
    }
    if(alive)requestAnimationFrame(tick);else ctx.clearRect(0,0,canvas.width,canvas.height);
  })();
}

// ── Auto-height: tell the parent page how tall we are, so an embedding
//    iframe can size itself exactly (responsive, no scrollbars). ──
(function () {
  function reportHeight() {
    var h = Math.ceil(Math.max(
      document.body.scrollHeight, document.documentElement.scrollHeight,
      document.body.offsetHeight, document.documentElement.offsetHeight
    ));
    try { parent.postMessage({ mvThermometerHeight: h }, '*'); } catch (e) {}
  }
  window.addEventListener('load', reportHeight);
  window.addEventListener('resize', reportHeight);
  if (window.ResizeObserver) { new ResizeObserver(reportHeight).observe(document.body); }
  // catch reflows from web-font load and the fill/confetti animation
  [50, 300, 800, 1600, 3000].forEach(function (t) { setTimeout(reportHeight, t); });
})();
</script>
